# stacks.conf — auto-seeded default. Every option the menu shows lives here.
# Machine-specific values are blank so the program auto-detects them
# (e.g. an unset STACKS_DIR makes it find each stack in the directory it
# actually lives in, from the Docker compose labels). Edit freely.

STACKS_DIR=
DYNAMICS_DIR=
SNAPSHOT_DIR=
DOMAIN=
PRIMARY_NETWORK=
PRIMARY_SUBNET=
SABLIER_SCALE_ENABLED=1
FIX_REPLACE_BROKEN_HC=1
FIX_REMOVE_GAPS=1
FIX_STRIP_PROFILES=1
FIX_CONVERT_NAMED_TO_BIND=1
FIX_VOLUME_BASE=
FIX_CREATE_VOLUME_DIRS=1
FIX_AUTO_NETWORKS=traefik_net
FIX_AUTO_NETWORK_PRIORITY=1000
FIX_AUTO_LINK_NETWORKS=1
FIX_AUTO_LINK_PRIORITY=500
FIX_AUTO_COMPOSE_NETWORK=0
FIX_AUTO_COMPOSE_NETWORK_PRIORITY=200
FIX_AUTO_DEPENDS_ON=1

# Auto-name compose files with stack name
FIX_AUTO_NAME=1

# Space-separated containers to skip healthcheck injection
FIX_HC_SKIP=

# Comma-separated IPs never reassigned by fix
LOCKED_IPS=

# Space-separated containers skipped by stacks scale on
SCALE_SKIP_CONTAINERS=

# Space-separated containers skipped by stacks proxy on
PROXY_SKIP_CONTAINERS=

# Use stack prefix as sablier group name
SCALE_AUTO_GROUP=1

# Inject stop_grace_period into anchor
INJECT_STOP_GRACE=1

# Inject logging config into anchor
INJECT_LOGGING=1

# Inject restart policy into anchor
INJECT_RESTART=0

# Inject deploy resource limits into services
INJECT_DEPLOY=0

# Inject CPU core pinning into services
INJECT_CPUSET=0

# Inject block IO limits into services
INJECT_BLKIO=0

# Inject ulimits into services
INJECT_ULIMITS=0

# Override stacks directory location
STACKS_DIR_OVERRIDE=

# Override dynamics directory location
DYNAMICS_DIR_OVERRIDE=

# fix/up also reconciles dynamic names against stacks
FIX_DYNAMICS=1

# IP/port collision auto-move (first-fit pack, keep default port, sticky)
IP_COLLISION_AUTOFIX=1

# IPs the collision fixer will NEVER assign (comma-separated)
IP_BLACKLIST=

# Ports never assigned as a NEW port (default ports are still kept)
PORT_BLACKLIST="22,80,443,3306,5432,6379,27017,2375,2376"

# If set, ONLY these IPs are used (comma-separated; overrides range)
IP_WHITELIST=

# First IP in the assignable pool
IP_RANGE_START=

# Last IP in the assignable pool
IP_RANGE_END=

# Lowest port used for a last-resort port move
PORT_RANGE_START=8080

# Highest port used for a last-resort port move
PORT_RANGE_END=8999

# Primary public domain for generated routers
PRIMARY_DOMAIN=

# Authentik outpost URL (the main gate; forwardAuth target)
AUTHENTIK_URL=

# Generate Authentik forwardAuth on every router (the main gate)
GEN_AUTH=1

# Generate CrowdSec bouncer middleware on every router
GEN_CROWDSEC=1

# Generate Sablier sleep/wake middleware (skips sablier.enable=false services)
GEN_SABLIER=1

# Add a Permissions-Policy response header (safe, recommended)
GEN_PERMISSIONS_POLICY=1

# Add Content-Security-Policy header (OFF: CSP can break apps; tune CSP_POLICY first)
GEN_CSP=0

# Restrict origin to Cloudflare edge + LAN IPs (OFF: can lock out direct/LAN access)
GEN_CF_IPALLOW=0

# Extra CIDRs always allowed when GEN_CF_IPALLOW=1 (e.g. your VPN subnet)
CF_TRUSTED_IPS=

# Use the rich config-driven generator (~/.config/stacks/dynamics.yaml). 0=legacy generator
GEN_RICH=1

# On 'dynamics generate': create/merge DB TCP entrypoints into Traefik (append-only) + reserve their ports
GEN_DB_ENTRYPOINTS=1

# Restart Sablier on 'up': 1/stack=after each stack, N=every N stacks, 0/end=only at the very end
SABLIER_RESTART_EVERY=1

# How many stacks to bring up at once on 'up' AND at boot (1=sequential, 2/3/...=parallel)
UP_PARALLEL=3

# Force-override ALL healthchecks on 'fix' (remove existing, probe + apply the proper one to every service)
FIX_FORCE_HC=0

# Record image version history (for rollback) — snapshots digests over time
IMAGE_HISTORY_ENABLED=1

# How many past versions to keep per image (oldest pruned beyond this)
IMAGE_HISTORY_KEEP=10

# After 'fix', delete now-unused top-level named-volume declarations (bind-mount cleanup)
FIX_STRIP_VOLUMES=1

# On fix/up: when an image fails to pull, offer a registry search to find a replacement (interactive)
FIX_AUTO_SEARCH=1

# Reclaim: protect images referenced by a stack compose file even when their container is down (Sablier-safe). 'reclaim clean --aggressive' overrides this for one run
RECLAIM_PROTECT_STACK_IMAGES=1

# Path to the stacks git clone (for 'stacks update' self-update); blank = autodetect
STACKS_REPO_DIR=

# Git branch 'stacks update' checks for new versions
STACKS_UPDATE_BRANCH=master

# On 'fix': remove duplicate container_name definitions (keep by category: running stack first, else core/db/net/ai/data/srvs over dev scratch; skips *-ext VPS stacks)
FIX_DEDUPE=1

# On 'fix': resolve double-creator networks — one stack owns each (external:false+subnet, core/provisioner preferred), the rest become external:true (silences 'network exists but was not created for project')
FIX_NET_DEDUPE=1

# ── Controlled boot bring-up (stacks up --boot) ──────────────────────────────
# Seconds to wait after boot before starting containers (startup delay timer)
BOOT_DELAY=0
# Space-separated stacks (or stack/service) to start at boot
BOOT_STACKS=
# First-pass strategy at boot: up | repair | recreate | fix
START_STRATEGY=repair
# If a stack stays unhealthy, climb the escalation chain below (1=on 0=off)
BOOT_ESCALATE=1
# Ordered harder steps to try if a stack is unhealthy at boot
BOOT_ESCALATION=recreate fix
# Force every strategy step ALWAYS instead of only-if-needed (1=forced 0=auto)
BOOT_FORCE=0
# Pre-pull images for non-boot stacks and leave them stopped (1=on 0=off)
BOOT_DOWNLOAD_MISSING=0
# Disable Docker's own container auto-start; let stacks control startup (1=on 0=off)
BOOT_OVERRIDE_DOCKER=0
# ── Watchdog (stacks watch) ──────────────────────────────────────────────────
# Run the 24/7 watchdog that keeps watched stacks alive (1=on 0=off)
WATCH_ENABLED=1
# Space-separated stacks the watchdog keeps alive (blank = use BOOT_STACKS)
WATCH_STACKS=
# Seconds between watchdog health sweeps
WATCH_INTERVAL=30
# What the watchdog does to a down stack: up | repair | recreate | fix
WATCH_STRATEGY=repair
# Watchdog: climb the escalation chain if a stack stays unhealthy (1=on 0=off)
WATCH_ESCALATE=1
# Ordered harder steps the watchdog tries if a stack stays unhealthy
WATCH_ESCALATION=recreate fix
# Watchdog: force every step always vs only-if-needed (1=forced 0=auto)
WATCH_FORCE=0

# ── Auto-discovery (find stacks + containers without a configured folder) ────
# Automatically show ALL running containers from the Docker API in the Containers
# tab, even ones not in your config (1=on 0=off)
AUTO_DETECT_CONTAINERS=1
# Automatically discover stacks via the Docker API (compose-project labels give
# each stack's name + exact compose-file path) and add them to the Stacks tab (1=on 0=off)
AUTO_DETECT_STACKS=1

# ── Zero Scale <-> Traefik integration ──────────────────────────────────────
# Auto-detect whether Traefik is running via the Docker API (1=on 0=off)
AUTO_DETECT_TRAEFIK=1
# When Traefik is present, drive Zero Scale wake/sleep through the Traefik API
# instead of generic middleware (1=on 0=off)
ZERO_SCALE_TRAEFIK_API=1

# ── Zero Scale engine (wake-on-visit) — global settings ──────────────────────
# Show/use Zero Scale even if Sablier is installed (they may conflict) (1=on 0=off)
ZERO_SCALE_FORCE=0
# Run the idle-sleeper loop that sleeps idle sites (wake still works if off) (1=on 0=off)
ZERO_SCALE_AUTOSTOP=1
# Seconds a site can be idle before it sleeps
ZERO_SCALE_IDLE=1800
# Seconds between idle/metrics sweeps
ZERO_SCALE_POLL=20
# Default loading-screen theme (minecraft|terminal|ghost|synthwave|pride)
ZERO_SCALE_DEFAULT_SCREEN=minecraft
# Engine HTTP listen address (Traefik errors-middleware routes wakes here)
ZERO_SCALE_LISTEN=:8788
# Public wake URL base
ZERO_SCALE_WAKE_BASE=
# Traefik Prometheus metrics URL (used to detect idle)
ZERO_SCALE_METRICS=http://traefik:8080/metrics
# Seconds to wait when stopping a sleeping container
ZERO_SCALE_STOP_TIMEOUT=10
# Stream the container's docker logs on the loading screen (1=on 0=off)
ZERO_SCALE_SHOW_LOGS=1
# How many log lines to tail on the loading screen
ZERO_SCALE_LOG_LINES=30

# ── Zero Scale — full Sablier-middleware parity (+ extras) ───────────────────
# Wake mode: dynamic (loading page) | blocking (wait for service, then proxy, no page)
ZERO_SCALE_MODE=dynamic
# Loading-screen refresh/retry frequency (Sablier refreshFrequency)
ZERO_SCALE_REFRESH=5s
# Max time to wait for a service to come up before giving up (Sablier timeout)
ZERO_SCALE_TIMEOUT=10m
# Grace period before health-checking a just-started service (Sablier warmupPeriod)
ZERO_SCALE_WARMUP=10s
# HTTP/health-probe the service before declaring "up" (not just container running) (1=on 0=off)
ZERO_SCALE_HEALTHCHECK=1
# Path to probe for "up" (Sablier healthCheckPath)
ZERO_SCALE_HEALTHCHECK_PATH=/
# How often to probe while waking (Sablier healthCheckInterval)
ZERO_SCALE_HEALTHCHECK_INTERVAL=2s
# Orchestration provider (Sablier provider)
ZERO_SCALE_PROVIDER=docker
# (compat) If set, proxy wake/sleep to an external Sablier server instead (Sablier sablierUrl)
ZERO_SCALE_SABLIER_URL=
# Wake target replicas (Sablier scaling.replicas)
ZERO_SCALE_REPLICAS=1
# Sleep target replicas (Sablier minReplicas)
ZERO_SCALE_MIN_REPLICAS=0
# Replica ceiling (Sablier maxReplicas)
ZERO_SCALE_MAX_REPLICAS=1
# Blocking mode: wait up to this long for the service, then proxy through anyway
ZERO_SCALE_BLOCKING_TIMEOUT=1m
# EXTRA (Sablier can't): wake a site's dependencies (its DB etc.) first (1=on 0=off)
ZERO_SCALE_WAKE_DEPENDS=1
# EXTRA: pre-start sites at boot so the first visit is instant (1=on 0=off)
ZERO_SCALE_PREWARM=0
# EXTRA: show a real progress/percent bar on the loading screen (1=on 0=off)
ZERO_SCALE_SHOW_PROGRESS=1
# EXTRA: seconds for the loading page auto-retry
ZERO_SCALE_RETRY_AFTER=2
\n
# ── Zero Scale — request handling ────────────────────────────────────────────
# Fail open: if the engine errors, let traffic through (soft retry) instead of blocking (Sablier failOpen) (1=on 0=off)
ZERO_SCALE_FAIL_OPEN=1
# User-agents that must NOT trigger a wake (bots/monitors/health-checks) (comma-separated, Sablier ignoreUserAgent)
ZERO_SCALE_IGNORE_USER_AGENTS=curl,UptimeRobot,Googlebot,HealthCheck
# On engine startup, stop managed sites so they begin asleep (Sablier auto-stop-on-startup) (1=on 0=off)
ZERO_SCALE_AUTO_STOP_ON_STARTUP=0
# Shared DB containers to wake + wait for FIRST on any Zero Scale visit (space-separated)
ZERO_SCALE_DEPENDS=pgvectordb redisdb

# ── Zero Scale — loading-screen / theme ──────────────────────────────────────
# Use the external theme .html files (1) or the built-in inline screen (0)
ZERO_SCALE_USE_THEMES=1
# Folder holding the theme .html files (minecraft.html, ghost.html, …) — the bellzloader screens
ZERO_SCALE_THEMES_DIR=
# Path to ONE custom .html file that OVERRIDES the theme/screen (blank = use the theme dir)
ZERO_SCALE_CUSTOM_HTML=
# Heading prefix on the loading screen
ZERO_SCALE_TITLE=Waking
# Sub-text/tip line on the loading screen
ZERO_SCALE_TIP=

# ── Watchdog: verify SITES actually serve (not just that containers run) ─────
# HTTP-check each watched stack's public site; if it's broken (502/404/timeout)
# even though the container is 'running', heal the stack (1=on 0=off)
WATCH_SITES=0
# HTTP status codes that count as 'site is working' (comma-separated)
WATCH_SITE_OK_CODES=200,204,301,302,307,308,401,403,405
# Seconds to wait for a site to answer before calling it down
WATCH_SITE_TIMEOUT=12
# After healing a stack, leave it alone this many seconds before re-checking,
# so it has time to come up instead of looping repair→repair (also the boot
# site-verify settle wait, capped at 30s there). Set 30 for a snappier loop.
HEAL_GRACE=120
# At boot, after bring-up, also verify each boot stack's SITE actually serves
# and heal any whose route is broken (502/404). Off by default (1=on 0=off)
BOOT_VERIFY_SITES=0
# Watchdog auto-pulls any MISSING images for the watched stacks — in the
# background, one image at a time (gentle), via the Docker API. So a stack
# whose image got deleted/never-downloaded heals itself. (1=on 0=off)
WATCH_PULL_MISSING=1

# ── Edge: the VPS edge-watchdog (`stacks edge`) ───────────────────────────
# Runs ON the VPS. Probes every public site from the real public edge and
# REPAIRS the edge (the home watchdog can't reach the edge). Same one stacks
# program — just the mode that fits the VPS. These are only used on the VPS.
# Watch list lives in edge.sites (one host per line); or set EDGE_SITES here.
EDGE_SITES=
EDGE_INTERVAL=60
# After an edge repair, leave the edge alone this long so it can settle (anti-loop)
EDGE_GRACE=120
# This many sites down AT ONCE = an EDGE incident (else it's a home-app issue)
EDGE_THRESHOLD=2
EDGE_OK_CODES=200,204,301,302,307,308,401,403,405
EDGE_TIMEOUT=12
# Repairs Edge is allowed to perform (1=on 0=off):
# reset Pangolin wildcard sso=1→0 (the recurring vault-killer)
EDGE_FIX_SSO=1
# restart pangolin if down/unhealthy
EDGE_RESTART_PANGOLIN=1
# restart gerbil (WireGuard tunnel) if down
EDGE_RESTART_GERBIL=1
# restart edge traefik if down
EDGE_RESTART_TRAEFIK=1
# escalate to compose --force-recreate if restarts don't fix it
EDGE_RECREATE_ON_FAIL=1
# Locations on the VPS (defaults match a standard Pangolin install):
EDGE_PANGOLIN_DB=/opt/pangolin/config/db/db.sqlite
EDGE_COMPOSE_FILE=/opt/pangolin/docker-compose.yml
# Optional: a shell command Edge runs when ONE site is down (a home-app issue),
# e.g. SSH home to poke its watchdog. Empty = just log it.
EDGE_TRIGGER_HOME=
